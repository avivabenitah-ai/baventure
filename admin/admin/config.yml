backend:
  name: github
  repo: avivabenitah-ai/baventure
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Articles"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description SEO", name: "description", widget: "string"}
      - {label: "Catégorie", name: "category", widget: "select", options: ["SEO", "Startups", "Small Business", "Visibility"]}
      - {label: "Image principale", name: "thumbnail", widget: "image", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}
